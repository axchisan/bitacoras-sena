services:
  postgres:
    image: postgres:16-alpine
    container_name: bitacoras_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bitacoras
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bitacoras_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitacoras -d bitacoras_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bitacoras_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://bitacoras:${POSTGRES_PASSWORD}@postgres:5432/bitacoras_db
    volumes:
      - uploads_data:/app/uploads
      - output_data:/app/output
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bitacoras_frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: bitacoras_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  uploads_data:
  output_data:
