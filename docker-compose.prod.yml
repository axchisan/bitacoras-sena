# Overrides de producción para Coolify
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# En Coolify se configura automáticamente apuntando a ambos archivos.

services:
  postgres:
    # En producción no exponemos la BD al host
    ports: !reset []

  backend:
    environment:
      DATABASE_URL: postgresql+asyncpg://bitacoras:${POSTGRES_PASSWORD}@postgres:5432/bitacoras_db
      ENVIRONMENT: production
    # No exponemos el backend directamente
    ports: !reset []

  frontend:
    # No necesita puerto externo, nginx hace el proxy
    ports: !reset []

  nginx:
    # Sin binding de puerto al host — Traefik accede directamente al contenedor
    ports: !reset []
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      # HTTP → redirige a HTTPS
      - "traefik.http.routers.bitacoras-http.rule=Host(`bitacoras.axchisan.com`)"
      - "traefik.http.routers.bitacoras-http.entrypoints=http"
      - "traefik.http.routers.bitacoras-http.middlewares=redirect-to-https@docker"
      # HTTPS con SSL automático via Let's Encrypt
      - "traefik.http.routers.bitacoras.rule=Host(`bitacoras.axchisan.com`)"
      - "traefik.http.routers.bitacoras.entrypoints=https"
      - "traefik.http.routers.bitacoras.tls=true"
      - "traefik.http.routers.bitacoras.tls.certresolver=letsencrypt"
      # Puerto interno del contenedor nginx
      - "traefik.http.services.bitacoras.loadbalancer.server.port=80"
      - "traefik.docker.network=coolify"

networks:
  coolify:
    external: true
